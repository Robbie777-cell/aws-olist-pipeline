<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TINGUA — Red Hídrica Colombia</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#050a0e; }
  #mapa { width:100%; height:100vh; }
  .leaflet-container { background:#050a0e !important; }

  .panel {
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    z-index:1000;
    background:rgba(5,10,14,0.92);
    border:1px solid rgba(13,127,165,0.4);
    border-radius:20px;
    padding:6px 16px;
    display:flex; align-items:center; gap:8px;
    backdrop-filter:blur(10px);
    white-space:nowrap;
  }
  .live-dot { width:7px; height:7px; border-radius:50%; background:#1a9e6e; box-shadow:0 0 8px #1a9e6e; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .panel-text { font-family:monospace; font-size:0.8rem; font-weight:700; letter-spacing:0.12em; color:#fff; }

  .leyenda {
    position:absolute; bottom:20px; right:10px; z-index:1000;
    background:rgba(5,10,14,0.92); border:1px solid rgba(13,127,165,0.25);
    border-radius:8px; padding:10px 14px; backdrop-filter:blur(10px);
    max-width: 200px;
  }
  .ley-title { font-size:0.58rem; text-transform:uppercase; letter-spacing:0.12em; color:#6a8a96; margin-bottom:7px; font-family:monospace; }
  .ley-item { display:flex; align-items:center; gap:7px; margin-bottom:4px; font-size:0.68rem; color:#c8dce6; }
  .ley-line { width:16px; height:2px; border-radius:1px; }
  .ley-dot { width:9px; height:9px; border-radius:50%; }
  .ley-fuente { font-size:0.58rem; color:#4a6a76; margin-top:8px; padding-top:6px; border-top:1px solid rgba(255,255,255,0.06); line-height:1.4; }

  .loading {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:999; color:#6a8a96; font-family:monospace; font-size:0.8rem;
  }

  .leaflet-popup-content-wrapper {
    background:rgba(8,20,28,0.97) !important; border:1px solid rgba(13,127,165,0.3) !important;
    border-radius:10px !important; color:#c8dce6 !important;
    font-family:sans-serif !important; box-shadow:0 8px 32px rgba(0,0,0,0.6) !important;
  }
  .leaflet-popup-tip { background:rgba(8,20,28,0.97) !important; }
  .p-title { font-size:0.88rem; font-weight:600; color:#fff; margin-bottom:7px; }
  .p-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; font-size:0.72rem; }
  .p-k { color:#6a8a96; } .p-v { color:#4fb8d4; font-family:monospace; }
</style>
</head>
<body>

<div class="panel">
  <div class="live-dot"></div>
  <div class="panel-text">TINGUA · RED HÍDRICA COLOMBIA</div>
</div>

<div id="mapa"></div>
<div class="loading" id="loading">Cargando red hídrica HydroSHEDS...</div>

<div class="leyenda">
  <div class="ley-title">Leyenda</div>
  <div class="ley-item"><div class="ley-line" style="background:#2a9fd6;opacity:0.85"></div> Ríos orden 7 (mayores)</div>
  <div class="ley-item"><div class="ley-dot" style="background:#0d7fa5;box-shadow:0 0 7px #0d7fa5"></div> Ciénaga Grande (-0.015)</div>
  <div class="ley-item"><div class="ley-dot" style="background:#1a9e6e;box-shadow:0 0 7px #1a9e6e"></div> Mallorquín (-0.246)</div>
  <div class="ley-item"><div class="ley-dot" style="background:#4fb8d4;box-shadow:0 0 7px #4fb8d4"></div> Totumo (-0.133)</div>
  <div class="ley-fuente">Fuente: WWF HydroSHEDS v1.0<br>via Google Earth Engine</div>
</div>

<script>
const mapa = L.map('mapa', {
  center: [4.5, -74.5],
  zoom: 5,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  maxZoom:19, opacity:1
}).addTo(mapa);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  maxZoom:19, opacity:0.65, zIndex:10
}).addTo(mapa);

// ── CARGAR RED HÍDRICA REAL (HydroSHEDS via GEE) ──
fetch('rios_colombia.geojson')
  .then(r => r.json())
  .then(data => {
    document.getElementById('loading').style.display = 'none';
    L.geoJSON(data, {
      style: function(feature) {
        const orden = feature.properties.o || 7;
        return {
          color: '#2a9fd6',
          weight: orden >= 7 ? 1.4 : 0.8,
          opacity: 0.65
        };
      }
    }).addTo(mapa);
    console.log('Ríos cargados:', data.features.length);
  })
  .catch(err => {
    document.getElementById('loading').textContent = 'Error cargando red hídrica';
    console.error(err);
  });

// ── HUMEDALES ──
const humedales = [
  {nombre:'Ciénaga Grande de Santa Marta', lat:10.85, lng:-74.35, ndwi:-0.015, ndvi:0.169, nubes:8.6, imagenes:80, estado:'NORMAL', color:'#0d7fa5', desc:'Mayor humedal costero de Colombia. Sitio RAMSAR.'},
  {nombre:'Ciénaga de Mallorquín',         lat:11.045,lng:-74.835,ndwi:-0.246,ndvi:0.244, nubes:2.0, imagenes:1,  estado:'NORMAL', color:'#1a9e6e', desc:'Laguna costera norte de Barranquilla.'},
  {nombre:'Ciénaga de Totumo',             lat:10.732,lng:-75.229,ndwi:-0.133,ndvi:0.140, nubes:1.6, imagenes:1,  estado:'NORMAL', color:'#4fb8d4', desc:'Humedal salobre con volcán de lodo activo.'}
];

humedales.forEach(h => {
  const r = h.imagenes > 50 ? 14 : 10;
  L.circleMarker([h.lat,h.lng],{radius:r+9,fillColor:'transparent',color:h.color,weight:1,opacity:0.3,fillOpacity:0}).addTo(mapa);
  L.circleMarker([h.lat,h.lng],{radius:r+5,fillColor:'transparent',color:h.color,weight:1,opacity:0.15,fillOpacity:0}).addTo(mapa);
  L.circleMarker([h.lat,h.lng],{radius:r,fillColor:h.color,color:'#fff',weight:1.5,opacity:1,fillOpacity:0.9})
    .addTo(mapa)
    .bindPopup(`
      <div class="p-title">${h.nombre}</div>
      <div style="font-size:0.68rem;color:#6a8a96;margin-bottom:7px">${h.desc}</div>
      <div class="p-grid">
        <div class="p-k">NDWI</div><div class="p-v">${h.ndwi}</div>
        <div class="p-k">NDVI</div><div class="p-v">${h.ndvi}</div>
        <div class="p-k">Nubes</div><div class="p-v">${h.nubes}%</div>
        <div class="p-k">Imágenes</div><div class="p-v">${h.imagenes}</div>
        <div class="p-k">Estado</div><div class="p-v" style="color:#1a9e6e">${h.estado}</div>
      </div>
    `);
});
</script>
</body>
</html>
